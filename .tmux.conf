# changing binds for horizontal and vertical splits
bind ] split-window -h
bind [ split-window -v
unbind '"'
unbind %

# assigning reload key to reload conf
bind r source-file ~/.tmux.conf

# switching panes without prefix C-b
# M - meta i.e. alt key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# enabling mouse control
set -g mouse on

# disable auto window rename
set-option -g allow-rename off